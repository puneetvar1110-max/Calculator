<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    
    <div class="calc_cont">
        <div class="calculator">


            <h1>Calculator</h1>

            <div class="display">0</div>

            <div class="number">
                <div class="boxes">7</div>
                <div class="boxes">8</div>
                <div class="boxes">9</div>
                <div class="boxes operator">/</div>

                <div class="boxes">4</div>
                <div class="boxes">5</div>
                <div class="boxes">6</div>
                <div class="boxes operator">*</div>

                <div class="boxes">1</div>
                <div class="boxes">2</div>
                <div class="boxes">3</div>
                <div class="boxes operator">-</div>

                <div class="boxes">0</div>
                <div class="boxes">.</div>

                <div class="boxes equal">=</div>
                <div class="boxes operator">+</div>

            </div>
            <div class="del_cont">
                <div class="boxes del">DEL</div>
                <div class="boxes clear">Clear</div>
            </div>
        </div>
    </div>


    <footer class="footer">
        <p>Made with ❤️ by <span>Puneet Varshney</span></p>
    </footer>

</body>
<script src="script.js"></script>

</html>
